name: intellekt_mobile
description: INTELLEKT Mobile Application for Android & iOS

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ==============================
  # State Management
  # ==============================
  provider: ^6.1.5

  # ==============================
  # Networking
  # ==============================
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0

  # ==============================
  # Routing
  # ==============================
  go_router: ^16.2.1

  # ==============================
  # Secure Storage
  # ==============================
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # ==============================
  # Fonts
  # ==============================
  google_fonts: ^6.3.1

  # ==============================
  # SVG
  # ==============================
  flutter_svg: ^2.2.0

  # ==============================
  # Cached Network Images
  # ==============================
  cached_network_image: ^3.4.1

  # ==============================
  # Date Formatting
  # ==============================
  intl: ^0.20.2

  # ==============================
  # Connectivity
  # ==============================
  connectivity_plus: ^7.0.0
  internet_connection_checker_plus: ^2.7.2

  # ==============================
  # Permissions
  # ==============================
  permission_handler: ^12.0.1

  # ==============================
  # Image & File Picker
  # ==============================
  image_picker: ^1.2.0
  file_picker: ^10.3.2

  # ==============================
  # Launch URLs
  # ==============================
  url_launcher: ^6.3.2

  # ==============================
  # Toast
  # ==============================
  fluttertoast: ^8.2.12

  # ==============================
  # Animations
  # ==============================
  lottie: ^3.3.2
  loading_animation_widget: ^1.3.0

  # ==============================
  # Pull To Refresh
  # ==============================
  pull_to_refresh_flutter3: ^2.0.2

  # ==============================
  # PDF
  # ==============================
  pdf: ^3.11.3
  printing: ^5.14.2

  # ==============================
  # Logging
  # ==============================
  logger: ^2.6.1

  # ==============================
  # App Information
  # ==============================
  package_info_plus: ^9.0.0

  # ==============================
  # Device Information
  # ==============================
  device_info_plus: ^12.2.0

  # ==============================
  # UUID
  # ==============================
  uuid: ^4.5.1

  # ==============================
  # Environment Variables
  # ==============================
  flutter_dotenv: ^5.2.1

  # ==============================
  # JSON Serialization
  # ==============================
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.7.0
  json_serializable: ^6.11.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
    - assets/animations/
    - assets/json/
    - .env

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700